<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de vuelo - AeroLink</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/detalles_vuelos.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="icon" href="../img/aerolink1.png" />
  </head>

  <body>
    <header id="main-header"></header>

    <main class="detalle-vuelo">
      <div class="detalle-header">
        <h2>Tu vuelo</h2>
      </div>

      <div class="vuelo-detalle-card">
        <div class="top-info">
          <div class="aerolinea">
            <img
              src="/img/aerolineasArgentinas.png"
              alt="Aerolíneas Argentinas"
            />
            <span>CM 0139</span>
          </div>

          <div class="fecha">
            <p>06/05/2026</p>
          </div>

          <div class="actualizado">
            <p>Actualizado 22:22</p>
          </div>
        </div>
        <div class="ruta">
          <div class="origen">
            <h1>EZE</h1>
            <p>Ezeiza</p>

            <span>Partida :</span>
            <strong>00:10 hs</strong>
          </div>

          <div class="vuelo-linea">
            <div class="linea"></div>
          </div>

          <div class="destino">
            <h1>PTY</h1>
            <p>Panamá</p>

            <span class="estado">EN HORARIO</span>
          </div>
        </div>
        <div class="info-extra">
          <div>
            <p>Check-in</p>
            <strong>214-220</strong>
          </div>

          <div>
            <p>Sector</p>
            <strong>F</strong>
          </div>

          <div>
            <p>Puerta</p>
            <p>--</p>
          </div>
        </div>
        <div class="acciones">
          <a href="https://wa.me/549XXXXXXXXXX" class="btn-primary"
            ><i class="fa-brands fa-whatsapp"></i> Seguir vuelo
          </a>
        </div>
      </div>
    </main>

     <footer id="main-footer"></footer>
  
  <script src="../js/header.js"></script>
  <script src="../js/footer.js"></script>
  </body>
</html>
