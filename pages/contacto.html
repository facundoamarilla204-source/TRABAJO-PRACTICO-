<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroLink - Contacto</title>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/contacto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../img/aerolink1.png">
</head>
<body>
  <header id="main-header"></header>
      <main class="contenido-principal">

        <div class="contact-card">
            
   
            <div class="contact-form-side">
                <div class="contact-header">
                    <span class="brand-badge"><i class="fa-solid fa-plane"></i> AeroLink</span>
                    <h2>Nos encantaría ayudarte</h2>
                    <p>Contanos un poco sobre tu consulta o problema con tu reserva, y nos pondremos en contacto con vos a la brevedad.</p>
                </div>

                <form action="#" class="custom-form">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ingresá tu nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="Ingresá tu email" required>
                    </div>

                    <div class="form-group">
                        <label for="motivo">Motivo de consulta</label>
                        <select id="motivo" required>
                            <option value="" disabled selected>Seleccioná el motivo</option>
                            <option value="reserva">Problemas con mi reserva</option>
                            <option value="equipaje">Dudas sobre equipaje</option>
                            <option value="reembolso">Cambios y Reembolsos</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" rows="3" placeholder="Detallá tu consulta aquí..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Enviar Consulta</button>
                </form>
            </div>

            <div class="contact-image-side">
                <img src="../img/avion-contacto.jpg" alt="Vuelo AeroLink" class="img-fondo-cover">
            </div>

        </div>

    </main>


   <footer id="main-footer"></footer>
  
  <script src="../js/header.js"></script>
  <script src="../js/footer.js"></script>
</body>
</html>
