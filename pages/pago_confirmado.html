<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroLink - Confirmación de Pago</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/pago_confirmado.css" />
    <link rel="icon" type="image/png" href="../img/aerolink1.png" />
</head>

<body>

    <header id="main-header"></header>



    <main class="pago_confirmado_container">

        <div class="pago_container">

            <div class="compra_realizada_con_exito_container">

                <i class="fa-solid fa-circle-check tilde_imagen"></i>
                <h1>¡Tu compra se realizó con éxito!</h1>

            </div>


            <div class="email_detalles_contenedor">

                <i class="fa-solid fa-envelope icono_email_confirmado"></i>
                <p>
                    Te enviamos los detalles a
                    <strong id="emailCliente"></strong>
                </p>

            </div>



            <div class="button_container">

                <a href="/pages/usuario.html"><button class="button">Ir a mis reservas</button></a>
                <a href="../index.html"><button class="button">Volver al inicio</button>
                </a>

            </div>

        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="../js/header.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/pago_confirmado.js"></script>
    
</body>

</html>
