<!DOCTYPE html>
<html lang="es">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AeroLink - Iniciar Sesión</title>
      <link rel="stylesheet" href="../css/estilo_login.css">
      <link rel="stylesheet" href="../css/header.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
      <link rel="icon" type="image/png" href="../img/aerolink1.png">
  </head>
  <body>

      <header id="main-header"></header>
      <main>
          <h2 class="titulo">Iniciar Sesión</h2>

          <section class="formulario">
              <form action="../index_logueado.html">
                  <div class="grupo-formulario">
                      <label for="email">Correo electrónico</label>
                      <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                  </div>

                  <div class="grupo-formulario">
                      <label for="password">Contraseña</label>
                      <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                  </div>

                  <button type="submit" class="btn-iniciar-sesion">
                    Iniciar sesión
                  </button>
              </form>
              <p>¿Olvidaste tu contraseña? <a href="./recuperar.html">Recupérala aquí</a></p>
              <p>¿No tienes una cuenta? <a href="./registro.html">Regístrate</a></p>
          </section>
      </main>
  <footer id="main-footer"></footer>
  
  <script src="../js/header.js"></script>
  <script src="../js/footer.js"></script>
    <script src="../js/login.js"></script>

  </body>
</html>
